# ==============================================================================
# GitHub Actions Workflow: Run R Scripts
# Project: pathways_sustainable_intensification_Malawi
#
# Runs the two R scripts
#
# Triggers on changes to:
#   - scripts/
#   - data/raw/
#   - .github/workflows/
# ==============================================================================

name: Run R Scripts

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/**'
      - 'data/raw/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/raw/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e '
          install.packages(c(
            "tidyverse",
            "igraph",
            "ggraph",
            "tidygraph",
            "webshot",
            "htmlwidgets",
            "networkD3",
            "DiagrammeR",
            "deSolve",
            "FactoMineR",
            "factoextra",
            "reshape2",
            "threejs",
            "corrplot"
          ), dependencies = TRUE)
          '

      - name: Run Script 1 - Network Analysis
        run: |
          cd scripts
          Rscript --vanilla 1.Network_analysis.R

      - name: Run Script 2 - Pathway Analysis
        run: |
          cd scripts
          Rscript --vanilla 2.Pathway_analysis.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outputs
          path: |
            output/
            data/processed/
          retention-days: 7
