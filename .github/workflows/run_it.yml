# ==============================================================================
# GitHub Actions Workflow: Pathways Sustainable Intensification Malawi
# Project: pathways_sustainable_intensification_Malawi
#
# Jobs:
#   1. syntax-check – parse() all R scripts
#   2. full-pipeline – install packages, run all scripts sequentially 
#
# Triggers:
#   - Push to main/develop branches
#   - Changes to scripts/ or data/raw/ directories
#   - Pull requests to main
#   - Manual workflow_dispatch
# ==============================================================================

name: Run R Scripts

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/**'
      - 'data/raw/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/raw/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # --- INSTALL SYSTEM DEPENDENCIES ---
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglpk-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libmagick++-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            pandoc
          sudo ldconfig

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e '
          install.packages(c(
            "tidyverse",
            "igraph",
            "ggraph",
            "tidygraph",
            "webshot",
            "htmlwidgets",
            "networkD3",
            "DiagrammeR",
            "deSolve",
            "FactoMineR",
            "factoextra",
            "reshape2",
            "threejs",
            "corrplot"
          ), dependencies = TRUE)
          '

      - name: Run Script 1 - Network Analysis
        run: |
          cd scripts
          Rscript --vanilla 1.Network_analysis.R

      - name: Run Script 2 - Pathway Analysis
        run: |
          cd scripts
          Rscript --vanilla 2.Pathway_analysis.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outputs
          path: |
            output/
            data/processed/
          retention-days: 7